# Nginx Configuration für Webseite-Clone (Westfalia)
# Speichern unter: /etc/nginx/sites-available/westfalia
# Aktivieren mit: ln -s /etc/nginx/sites-available/westfalia /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name westfalia-osterwick.de www.westfalia-osterwick.de;
    
    # Fallback auf IP-Adresse wenn keine Domain vorhanden
    # server_name 89.167.0.28;

    root /var/www/westfalia;
    index index.html;

    # Logging
    access_log /var/log/nginx/westfalia-access.log;
    error_log /var/log/nginx/westfalia-error.log;

    # Gzip Kompression
    gzip on;
    gzip_types text/css application/javascript image/svg+xml;
    gzip_comp_level 6;

    # Cache für statische Assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Hauptroute
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Fehlerseiten
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}

